name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x

      - name: Build everything via builder.ps1
        shell: pwsh
        run: pwsh -File builder.ps1 -Configuration Release -Zip

      - name: Locate release zips
        id: zipinfo
        shell: pwsh
        run: |
          $mcp   = Get-ChildItem -Path dist -Filter 'dnspymcp-*-win-x64.zip'      | Select-Object -First 1
          $agent = Get-ChildItem -Path dist -Filter 'dnspymcpagent-*-win-x64.zip' | Select-Object -First 1
          if (-not $mcp)   { throw "builder.ps1 did not produce a dnspymcp zip" }
          if (-not $agent) { throw "builder.ps1 did not produce a dnspymcpagent zip" }
          "mcp=$($mcp.FullName)"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "agent=$($agent.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.zipinfo.outputs.mcp }}
            ${{ steps.zipinfo.outputs.agent }}
