name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python -m pip install --upgrade pip && pip install -r tests/requirements.txt

      - name: Build everything via builder.ps1
        shell: pwsh
        run: pwsh -File builder.ps1 -Configuration Release

      - name: Build dnspymcptest (net48 fixture target)
        shell: pwsh
        run: |
          dotnet build dnspymcptest/dnspymcptest.csproj -c Debug
          if ($LASTEXITCODE -ne 0) { throw "dnspymcptest build failed" }

      - name: Run pytest
        shell: pwsh
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          pytest tests -v --tb=short

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: tests/*.log
          if-no-files-found: ignore
